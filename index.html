<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eko-Söz</title>
    <style>
        :root {
            --eco-green: #4ade80;
            --dark-green: #166534;
            --bg-color: #f0fdf4;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            width: 90%;
            max-width: 500px;
            background: white;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
        }
        .page { display: none; }
        .active { display: block; }
        
        h1 { color: var(--dark-green); margin-bottom: 30px; }
        
        /* Notlardaki Yeşil Oval Buton Tasarımı  */
        .btn-green {
            background-color: var(--eco-green);
            color: black;
            border: 2px solid #000;
            padding: 15px 30px;
            margin: 10px 0;
            border-radius: 50px; /* Pill-shaped [cite: 97] */
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            font-size: 16px;
            transition: transform 0.2s;
        }
        .btn-green:hover { transform: scale(1.02); }
        
        select, input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border-radius: 10px;
            border: 1px solid #ccc;
        }
        
        .result-box {
            text-align: left;
            padding: 15px;
            border: 1px solid var(--eco-green);
            border-radius: 10px;
            background: #fff;
            max-height: 400px;
            overflow-y: auto;
        }
        .author-info { display: flex; justify-content: space-around; margin-bottom: 15px; }
        .author-card { font-size: 12px; border: 1px solid #ddd; padding: 5px; border-radius: 5px; }
    </style>
</head>
<body>

<div class="container">
    <div id="page1" class="page active">
        <h1>Eko-Söz [cite: 44]</h1>
        <button class="btn-green" onclick="showPage('page4')">Dönemine Göre [cite: 47]</button>
        <button class="btn-green" onclick="showPage('page5')">Yazarına Göre [cite: 48]</button>
        <button class="btn-green" onclick="showPage('page3')">Temasına Göre [cite: 49]</button>
    </div>

    <div id="page3" class="page">
        <h3>Tema Seçiniz [cite: 67]</h3>
        <select id="temaSelect">
            <option>Özgürlük [cite: 52]</option>
            <option>Ahlak ve Vicdan [cite: 53]</option>
            <option>Vatan Sevgisi ve Sorumluluk [cite: 55]</option>
            <option>İnsan-Toplum Çatışması [cite: 56, 57]</option>
            <option>Gelenek-Modernleşme [cite: 58]</option>
            <option>Ölüm-Yaşam [cite: 61]</option>
        </select>
        <button class="btn-green" onclick="generateText()">Metin Oluştur [cite: 73]</button>
        <button class="btn-green" style="background:#ddd" onclick="showPage('page1')">Geri [cite: 68]</button>
    </div>

    <div id="page4" class="page">
        <h3>Dönem Seçin [cite: 89]</h3>
        <select id="donem1">
            <option>İslamiyet Öncesi [cite: 84]</option>
            <option>Divan Edebiyatı [cite: 85]</option>
            <option>Tanzimat [cite: 85]</option>
            <option>Milli Edebiyat [cite: 87]</option>
        </select>
        <button class="btn-green" onclick="generateText()">Metin Oluştur [cite: 94]</button>
        <button class="btn-green" style="background:#ddd" onclick="showPage('page1')">Geri</button>
    </div>

    <div id="page5" class="page">
        <h3>Yazar Seçin [cite: 99, 100]</h3>
        <input type="text" placeholder="1. Yazar">
        <input type="text" placeholder="2. Yazar">
        <button class="btn-green" onclick="generateText()">Metin Oluştur [cite: 107]</button>
        <button class="btn-green" style="background:#ddd" onclick="showPage('page1')">Geri</button>
    </div>

    <div id="page6" class="page">
        <div class="author-info">
            <div class="author-card"><strong>Yazar 1</strong><br>Dönem Bilgisi [cite: 113]</div>
            <div class="author-card"><strong>Yazar 2</strong><br>Dönem Bilgisi [cite: 115]</div>
        </div>
        <div class="result-box" id="resultArea">
            </div>
        <button class="btn-green" onclick="showPage('page1')">Yeni Karşılaştırma</button>
    </div>
</div>

<script>
    function showPage(pageId) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(pageId).classList.add('active');
    }

    function generateText() {
        const resultArea = document.getElementById('resultArea');
        showPage('page6');
        resultArea.innerHTML = "<b>Yükleniyor...</b>";
        
        // Simüle edilmiş 500 kelimelik metin algoritması [cite: 39, 120]
        setTimeout(() => {
            resultArea.innerHTML = `
                <h4>Edebi Karşılaştırma [cite: 50]</h4>
                <p>Seçilen temada yazarların üslubu ve dönemlerine bağlı olarak farklılıklar görülmektedir[cite: 123, 127]. 
                Birinci yazarın yaklaşımı geleneksel çizgideyken, ikinci yazar modernleşme etkisindedir[cite: 58, 125]. 
                Bu metin yaklaşık 500 kelime olacak şekilde kurgulanmıştır[cite: 39]. 
                Konuşmacıların dönemlerine bağlı olarak üslupları bu noktada ayrışmaktadır[cite: 128].</p>
                <hr>
                <p><i>Not: Bu alan yapay zeka entegrasyonu ile gerçek zamanlı metin üretebilir.</i></p>
            `;
        }, 1000);
    }
</script>

</body>
</html>
